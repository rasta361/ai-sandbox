# Squid proxy configuration for Claude sandbox
# Restricts outbound access to whitelisted domains only

# Basic settings
http_port 3128
access_log /var/log/squid/access.log
cache_log /var/log/squid/cache.log

# Disable caching (we just want filtering)
cache deny all

# ACL definitions
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16
acl localnet src 127.0.0.0/8










acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Load allowed domains from file
acl allowed_domains dstdomain "/etc/squid/allowlist.txt"

# Security: deny non-safe ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow localhost
http_access allow localhost

# Allow access to whitelisted domains only
http_access allow localnet allowed_domains

# Deny everything else
http_access deny all
